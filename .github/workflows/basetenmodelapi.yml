name: Deploy Qwen to Baseten (TRT-LLM)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python and uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install truss
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install --upgrade truss

      - name: Create Truss directory and config.yaml
        run: |
          mkdir -p qwen-aeon
          cat > qwen-aeon/config.yaml << 'EOF'
          model_name: "qwen-aeon-single-l4"

          model_metadata:
            example_model_input:
              model: "Qwen/Qwen3.6-27B"
              messages:
                - role: user
                  content: "What is the capital of France?"
              max_tokens: 512
              temperature: 1.0
              top_p: 0.95
            tags:
              - openai-compatible

          resources:
            accelerator: L4
            use_gpu: true

          trt_llm:
            build:
              base_model: decoder
              checkpoint_repository:
                source: HF
                repo: "AEON-7/Qwen3.6-27B-AEON-Ultimate-Uncensored-Text-NVFP4-MTP-XS"
              max_seq_len: 131072
              quantization_type: no_quant
              tensor_parallel_count: 1
              plugin_configuration:
                paged_kv_cache: true
                use_paged_context_fmha: true
            runtime:
              kv_cache_free_gpu_mem_fraction: 0.9
              enable_chunked_context: true
              batch_scheduler_policy: guaranteed_no_evict
              served_model_name: "Qwen/Qwen3.6-27B"
          EOF

      - name: Login to Baseten
        run: |
          source .venv/bin/activate
          truss login --api-key "1X4X9ApI.mz1ddZdb36q936uEfARXnc01lbgYbIqA"

      - name: Push model to Baseten
        id: deploy
        run: |
          source .venv/bin/activate
          set +e
          OUTPUT=$(truss push qwen-aeon 2>&1)
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          echo "Output:"
          echo "$OUTPUT"

          CLEAN_OUTPUT=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')
          MODEL_ID=$(echo "$CLEAN_OUTPUT" | grep -oE 'Model ID:\s+[a-zA-Z0-9_-]+' | head -1 | sed 's/Model ID:\s*//')
          DEPLOYMENT_ID=$(echo "$CLEAN_OUTPUT" | grep -oE 'Deployment ID:\s+[a-zA-Z0-9_-]+' | head -1 | sed 's/Deployment ID:\s*//')

          if [ -z "$MODEL_ID" ] || [ -z "$DEPLOYMENT_ID" ]; then
            echo "::error::Failed to extract model/deployment IDs. Check the output above."
            echo "::error::Full output: $OUTPUT"
            exit 1
          fi

          echo "model_id=$MODEL_ID" >> $GITHUB_OUTPUT
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

      - name: Set scale-down-delay to 0 seconds
        run: |
          MODEL_ID="${{ steps.deploy.outputs.model_id }}"
          DEPLOYMENT_ID="${{ steps.deploy.outputs.deployment_id }}"
          curl --request PATCH \
            --url "https://api.baseten.co/v1/models/${MODEL_ID}/deployments/${DEPLOYMENT_ID}/autoscaling_settings" \
            --header "Authorization: Bearer 1X4X9ApI.mz1ddZdb36q936uEfARXnc01lbgYbIqA" \
            --header "Content-Type: application/json" \
            --data '{"scale_down_delay": 0}'

      - name: Print deployment details
        run: |
          MODEL_ID="${{ steps.deploy.outputs.model_id }}"
          echo "========================================"
          echo "✅ DEPLOYMENT COMPLETE!"
          echo "========================================"
          echo "📊 Model ID: $MODEL_ID"
          echo "📊 Deployment ID: ${{ steps.deploy.outputs.deployment_id }}"
          echo "🔗 Endpoint URL: https://model-${MODEL_ID}.api.baseten.co/environments/production/sync/v1/chat/completions"
          echo ""
          echo "🧠 To use reasoning parser:"
          echo "curl -X POST https://model-${MODEL_ID}.api.baseten.co/environments/production/sync/v1/chat/completions \\"
          echo "  -H 'Authorization: Bearer 1X4X9ApI.mz1ddZdb36q936uEfARXnc01lbgYbIqA' \\"
          echo "  -H 'Content-Type: application/json' \\"
          echo "  -d '{\"model\":\"Qwen/Qwen3.6-27B\",\"messages\":[{\"role\":\"user\",\"content\":\"Write a Go CLI\"}],\"reasoning_parser\":\"qwen3\",\"tool_parser\":\"qwen3_coder\"}'"
          echo "========================================"