name: Deploy Qwen3.6-27B on Modal

on:
  workflow_dispatch:

jobs:
  deploy-qwen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # --- ONLY INSTALL MODAL CLI ---
      - name: Install Modal CLI
        run: |
          pip install --upgrade pip
          pip install modal

      # --- HARDCODED MODAL CREDENTIALS ---
      - name: Authenticate Modal
        run: |
          modal token set \
            --token-id "ak-QB54iLlrnJZuw3T4MkGath" \
            --token-secret "as-nVpWbpGx9jk81qyMrykgbS"

      - name: Verify Modal Authentication
        run: modal profile list

      # --- DEPLOY ---
      - name: Deploy Qwen 27B Server
        id: deploy
        run: |
          modal deploy qwen_server.py 2>&1 | tee deploy_output.txt
          DEPLOY_URL=$(grep -oP 'https://[^\s]+--[^\s]+\.modal\.run' deploy_output.txt | head -1)
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployment URL: $DEPLOY_URL"

      # --- WAIT AND TEST ---
      - name: Wait for server to be ready
        run: |
          URL="${{ steps.deploy.outputs.DEPLOY_URL }}"
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" "$URL/health" | grep -q "200"; then
              echo "Server is ready!"
              break
            fi
            echo "Attempt $i: Waiting..."
            sleep 10
          done

      - name: Print deployment details
        run: |
          URL="${{ steps.deploy.outputs.DEPLOY_URL }}"
          echo "=========================================="
          echo "  QWEN 27B DEPLOYMENT COMPLETE"
          echo "=========================================="
          echo "📍 API Endpoint: $URL"
          echo "🔌 POST $URL/v1/chat/completions"
          echo "📚 Docs: $URL/docs"
          echo "=========================================="