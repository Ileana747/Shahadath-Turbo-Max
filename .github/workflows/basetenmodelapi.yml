name: Deploy Qwen Uncensored to Baseten (4×L4)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python and uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install truss
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install truss

      - name: Create config.yaml for 4×L4 with FP8
        run: |
          mkdir -p qwen-uncensored
          cat > qwen-uncensored/config.yaml << 'EOF'
          model_name: "qwen-uncensored-4xl4"

          model_metadata:
            example_model_input:
              model: "Qwen/Qwen3.6-27B"
              messages:
                - role: user
                  content: "What is the capital of France?"
              stream: true
              max_tokens: 512
              temperature: 1.0
              top_p: 0.95
            tags:
              - openai-compatible

          base_image:
            image: vllm/vllm-openai:v0.20.0

          weights:
            - source: "hf://Qwen/Qwen3.6-27B-FP8@main"
              mount_location: "/app/checkpoint/model"

          resources:
            accelerator: L4:4
            use_gpu: true

          runtime:
            predict_concurrency: 64

          environment_variables:
            HF_HUB_ENABLE_HF_TRANSFER: "1"
            VLLM_LOGGING_LEVEL: WARNING

          secrets:
            hf_access_token: null

          docker_server:
            start_command: >-
              sh -c "vllm serve /app/checkpoint/model
              --served-model-name Qwen/Qwen3.6-27B
              --host 0.0.0.0
              --port 8000
              --trust-remote-code
              --tensor-parallel-size 4
              --max-model-len 131072
              --dtype float16
              --gpu-memory-utilization 0.85
              --enable-chunked-prefill
              --language-model-only
              --reasoning-parser qwen3
              --enable-auto-tool-choice
              --tool-call-parser qwen3_coder
              --kv-cache-dtype fp8"
            readiness_endpoint: /health
            liveness_endpoint: /health
            predict_endpoint: /v1/chat/completions
            server_port: 8000
          EOF

      - name: Login to Baseten
        run: |
          source .venv/bin/activate
          truss login --api-key "1X4X9ApI.mz1ddZdb36q936uEfARXnc01lbgYbIqA"

      - name: Push model to Baseten
        id: deploy
        run: |
          source .venv/bin/activate
          set +e
          OUTPUT=$(truss push qwen-uncensored 2>&1)
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          echo "Output:"
          echo "$OUTPUT"
          
          # Remove ANSI color codes before parsing
          CLEAN_OUTPUT=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')
          
          MODEL_ID=$(echo "$CLEAN_OUTPUT" | grep -oE 'Model ID:\s+[a-zA-Z0-9_-]+' | head -1 | sed 's/Model ID:\s*//')
          DEPLOYMENT_ID=$(echo "$CLEAN_OUTPUT" | grep -oE 'Deployment ID:\s+[a-zA-Z0-9_-]+' | head -1 | sed 's/Deployment ID:\s*//')
          
          if [ -z "$MODEL_ID" ] || [ -z "$DEPLOYMENT_ID" ]; then
            echo "::error::Failed to extract model/deployment IDs. Check the output above."
            echo "::error::Full output: $OUTPUT"
            exit 1
          fi
          
          echo "model_id=$MODEL_ID" >> $GITHUB_OUTPUT
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

      - name: Set scale-down-delay to 0 seconds
        run: |
          MODEL_ID="${{ steps.deploy.outputs.model_id }}"
          DEPLOYMENT_ID="${{ steps.deploy.outputs.deployment_id }}"
          echo "Setting scale-down-delay to 0 seconds for model $MODEL_ID..."
          curl --request PATCH \
            --url "https://api.baseten.co/v1/models/${MODEL_ID}/deployments/${DEPLOYMENT_ID}/autoscaling_settings" \
            --header "Authorization: Bearer 1X4X9ApI.mz1ddZdb36q936uEfARXnc01lbgYbIqA" \
            --header "Content-Type: application/json" \
            --data '{"scale_down_delay": 0}'

      - name: Print deployment details
        run: |
          MODEL_ID="${{ steps.deploy.outputs.model_id }}"
          echo "========================================"
          echo "✅ DEPLOYMENT COMPLETE!"
          echo "========================================"
          echo "📊 Model ID: $MODEL_ID"
          echo "📊 Deployment ID: ${{ steps.deploy.outputs.deployment_id }}"
          echo "🔗 Endpoint URL: https://model-${MODEL_ID}.api.baseten.co/environments/production/sync/v1/chat/completions"
          echo "========================================"